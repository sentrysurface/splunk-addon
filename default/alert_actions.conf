#
# alert_actions.conf — Adaptive Response / Alert Action
#

[protectornet_scan]
is_custom = 1
label = ProtectorNet Threat Scan
description = Submit URL/domain to ProtectorNet for threat analysis and retrieve the verdict.
icon_path = appIcon.png
payload_format = json
disabled = 0

param.url_field = url
param.services = domainAnalysis,threatIntel

# Adaptive Response (ES)
param._cam = {"task": ["Create"], "subject": ["endpoint.threatintel"], "category": ["Information Conveyance"], "technology": [{"vendor": "ProtectorNet", "product": "Threat Intelligence", "version": "1.0.0"}]}
